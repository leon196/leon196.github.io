title: Les Espaces Rêvés
category: [ vr, kinect, pointcloud ]
tagline: live digital performance
date: 2021
info:
    - A performative short film. It is part of the Hétérotopia series, which explores the spaces that can connect us to our utopias. The idea is to open up the boundary between the work and the viewer by inviting them to enter the screen.
