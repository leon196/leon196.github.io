<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8" />
    <title>The Salt Please</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            height: 100%;
            margin: 0 auto;
        }
        #game {
            display: block;
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            background: #333333;
        }
        #info
        {
            font-family: sans-serif;
            font-family: 20px;
            color: black;
            background-color: #d6ff87;
            display: block;
            position: fixed;
            top: 8px;
            left: 8px;
            padding: 4px;
            width: 300px;
        }

        #info button
        {
            float: right;
        }
        @font-face {
            font-family: 'claire_hand';
            src: url('font/clairehandbold-webfont.eot');
            src: url('font/clairehandbold-webfont.eot?#iefix') format('embedded-opentype'),
                 url('font/clairehandbold-webfont.woff') format('woff'),
                 url('font/clairehandbold-webfont.ttf') format('truetype'),
                 url('font/clairehandbold-webfont.svg#claire_handbold') format('svg');
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>
    <body>
        <div id="game"></div>
        <div id="info">
            Hello there !
            <br/>
            This is the jam version of the game.
            <br/>
            Working on new version, with technical improvements and more content.
            <br/>
            <button onclick="window.document.getElementById('info').style.visibility = 'hidden'">&nbsp;Okay&nbsp;</button>
        </div>
        <script src="js/lib/jquery-2.1.1.min.js"></script>
        <script src="js/lib/pixi.dev.js"></script>
        <script src="js/lib/tweener.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/input.js"></script>
        <script src="js/level.js"></script>
        <script src="js/arm.js"></script>
        <script src="js/head.js"></script>
        <script src="js/bull.js"></script>
        <script src="js/character.js"></script>
        <script src="js/game.js"></script>
        <script src="js/animation.js"></script>
    </body>
</html>
